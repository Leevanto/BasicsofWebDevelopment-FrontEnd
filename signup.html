<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – College Cache</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-ring"></div>

  <div class="page-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">🎒</div>
      <span class="brand-name">College Cache</span>
      <span class="brand-sub">Campus Lost &amp; Found</span>
    </div>

    <!-- Card -->
    <div class="card">
      <h1 class="card-title">Create account</h1>
      <p class="card-subtitle">Join your campus community to report and recover lost items.</p>

      <div class="divider"></div>

      <div class="field-row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            name="firstName"
            placeholder="Jane"
            autocomplete="given-name"
            required
          />
        </div>

        <div class="field">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            placeholder="Smith"
            autocomplete="family-name"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="userId">User ID</label>
        <input
          type="text"
          id="userId"
          name="userId"
          placeholder="e.g. jsmith@albany.edu"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Create a strong password"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="button" class="btn-submit">Create Account</button>

      <p class="card-footer">
        Already have an account?&nbsp;
        <a href="login.html">Sign in</a>
      </p>
    </div>

    <p class="tagline">University of Albany &nbsp;·&nbsp; Spring 2026</p>

  </div>

</body>
</html>
