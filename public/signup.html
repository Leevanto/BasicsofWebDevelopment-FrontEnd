<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – College Cache</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-ring"></div>

  <div class="page-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">🎒</div>
      <span class="brand-name">College Cache</span>
      <span class="brand-sub">Campus Lost &amp; Found</span>
    </div>

    <!-- Card -->
    <div class="card">
      <h1 class="card-title">Create account</h1>
      <p class="card-subtitle">Join your campus community to report and recover lost items.</p>

      <div class="divider"></div>

      <div class="field-row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            name="firstName"
            placeholder="Jane"
            autocomplete="given-name"
            required
          />
        </div>

        <div class="field">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            placeholder="Smith"
            autocomplete="family-name"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="userId">User ID</label>
        <input
          type="text"
          id="userId"
          name="userId"
          placeholder="e.g. jsmith@albany.edu"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Create a strong password"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="button" class="btn-submit">Create Account</button>

      <p class="card-footer">
        Already have an account?&nbsp;
        <a href="login.html">Sign in</a>
      </p>
    </div>

    <p class="tagline">University of Albany &nbsp;·&nbsp; Spring 2026</p>

  </div>

 <script>
    // Insert alert banner into card after the divider
    document.querySelector('.divider').insertAdjacentHTML(
      'afterend',
      '<div id="alert" class="alert" role="alert" aria-live="polite"></div>'
    );

    document.querySelector('.btn-submit').addEventListener('click', async () => {
      const f_name   = document.getElementById('firstName').value.trim();
      const l_name   = document.getElementById('lastName').value.trim();
      const username = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      const alertEl  = document.getElementById('alert');
      const btn      = document.querySelector('.btn-submit');

      // Reset alert
      alertEl.className = 'alert';
      alertEl.textContent = '';

      // Client-side validation
      if (!f_name || !l_name || !username || !password) {
        alertEl.className = 'alert error';
        alertEl.textContent = 'Please fill in all fields.';
        return;
      }
      if (password.length < 6) {
        alertEl.className = 'alert error';
        alertEl.textContent = 'Password must be at least 6 characters.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const response = await fetch('http://localhost:5001/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ f_name, l_name, username, password }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alertEl.className = 'alert success';
          alertEl.textContent = data.message;
          // Clear form
          document.getElementById('firstName').value = '';
          document.getElementById('lastName').value  = '';
          document.getElementById('userId').value    = '';
          document.getElementById('password').value  = '';
        } else {
          alertEl.className = 'alert error';
          alertEl.textContent = data.message || 'Signup failed. Please try again.';
        }
      } catch (err) {
        alertEl.className = 'alert error';
        alertEl.textContent = 'Could not reach the server. Is it running?';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.querySelector('.btn-submit').click();
    });
  </script>

</body>
</html>
